<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Laut</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="ocean-background">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container">
        <header>
            <h1>Perpus MUGRES B</h1>
            <p>Jelajahi dunia pengetahuan diperpustakaan</p>
        </header>

        <main>
            <div class="card">
                <h2>🔍 Pemindaian Buku</h2>
                <div id="qr-reader" style="width: 100%"></div>
                <button id="startScan">Mulai Pemindaian</button>
                <div id="scanResult"></div>
            </div>

            <div class="card">
                <h2>👤 Data Pengunjung</h2>
                <form id="visitorForm">
                    <input type="text" id="visitorName" placeholder="Nama Lengkap" required>
                    <input type="text" id="visitorClass" placeholder="Kelas" required>
                    <select id="activityType" required>
                        <option value="">Pilih Aktivitas</option>
                        <option value="reading">Membaca</option>
                        <option value="borrowing">Meminjam</option>
                        <option value="returning">Mengembalikan</option>
                    </select>
                    <input type="text" id="bookTitle" placeholder="Judul Buku" required>
                    <select id="bookStatus" required>
                        <option value="">Status Buku</option>
                        <option value="dibaca">Dibaca</option>
                        <option value="dipinjam">Dipinjam</option>
                        <option value="dikembalikan">Dikembalikan</option>
                    </select>
                    <input type="text" id="bookQR" placeholder="Kode QR Buku" required>
                    <button type="submit">Simpan Data</button>
                </form>
            </div>

            <div class="card">
                <h2>📊 Riwayat Aktivitas</h2>
                <div id="activityList"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
